<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Supply by Tuniverse | Music Production Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --secondary-light: #67e8f9;
            --accent: #f472b6;
            --accent-light: #f9a8d4;
            --dark: #0a0a0f;
            --darker: #050508;
            --dark-elevated: #13131f;
            --dark-card: #1a1a2e;
            --light: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --success: #10b981;
            --warning: #f59e0b;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            --gradient-secondary: linear-gradient(135deg, #06b6d4 0%, #67e8f9 100%);
            --gradient-accent: linear-gradient(135deg, #f472b6 0%, #f9a8d4 100%);
            --gradient-dark: linear-gradient(180deg, #0a0a0f 0%, #13131f 100%);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-accent: 'Space Grotesk', sans-serif;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.6);
            --shadow-glow: 0 0 40px rgba(99,102,241,0.3);
            --shadow-glow-cyan: 0 0 40px rgba(6,182,212,0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; font-size: 16px; }

        body {
            font-family: var(--font-body);
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }
        ::selection { background: var(--primary); color: white; }

        h1, h2, h3, h4 {
            font-family: var(--font-display);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
        }

        h2 { font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: 1.25rem; }
        h3 { font-size: clamp(1.2rem, 2.5vw, 1.6rem); margin-bottom: 0.75rem; }

        p { color: var(--gray-400); line-height: 1.7; }

        a { text-decoration: none; color: inherit; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .text-gradient {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-gradient-cyan {
            background: var(--gradient-secondary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1rem 2rem;
            border-radius: var(--radius-xl);
            font-family: var(--font-accent);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before { left: 100%; }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 60px rgba(99,102,241,0.5);
        }

        .btn-secondary {
            background: transparent;
            color: var(--light);
            border: 2px solid rgba(99,102,241,0.5);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(99,102,241,0.15);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .btn-full { width: 100%; }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px) saturate(180%);
            z-index: 1000;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(99,102,241,0.1);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--light);
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            font-family: var(--font-accent);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding: 0.5rem 0;
            color: var(--gray-300);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover { color: var(--light); }
        .nav-links a:hover::after { width: 100%; }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 24px 100px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(244,114,182,0.05) 0%, transparent 50%),
                var(--darker);
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        .hero-content {
            max-width: 900px;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: var(--radius-xl);
            font-family: var(--font-accent);
            font-size: 0.8rem;
            color: var(--primary-light);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
        }

        .hero-badge i { color: var(--secondary); }

        .hero h1 {
            margin-bottom: 1.25rem;
            text-shadow: 0 0 80px rgba(99,102,241,0.3);
        }

        .hero-subtitle {
            font-family: var(--font-display);
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--secondary);
            margin-bottom: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .hero-description {
            font-size: 1.15rem;
            color: var(--gray-400);
            max-width: 650px;
            margin: 0 auto 2.5rem;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .stat-item { text-align: center; }

        .stat-number {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary-light);
        }

        .stat-label {
            font-family: var(--font-accent);
            font-size: 0.8rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-visual {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.25;
            z-index: 1;
        }

        .sound-wave {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 80px;
        }

        .sound-wave span {
            width: 5px;
            background: var(--gradient-primary);
            border-radius: 3px;
            animation: wave 1.4s ease-in-out infinite;
        }

        .sound-wave span:nth-child(1) { height: 15%; animation-delay: 0s; }
        .sound-wave span:nth-child(2) { height: 35%; animation-delay: 0.1s; }
        .sound-wave span:nth-child(3) { height: 55%; animation-delay: 0.2s; }
        .sound-wave span:nth-child(4) { height: 75%; animation-delay: 0.3s; }
        .sound-wave span:nth-child(5) { height: 100%; animation-delay: 0.4s; }
        .sound-wave span:nth-child(6) { height: 100%; animation-delay: 0.5s; }
        .sound-wave span:nth-child(7) { height: 75%; animation-delay: 0.6s; }
        .sound-wave span:nth-child(8) { height: 55%; animation-delay: 0.7s; }
        .sound-wave span:nth-child(9) { height: 35%; animation-delay: 0.8s; }
        .sound-wave span:nth-child(10) { height: 15%; animation-delay: 0.9s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .section-header h2 { margin-bottom: 1rem; }
        .section-header p { font-size: 1.1rem; color: var(--gray-400); }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary-light);
            margin-bottom: 1rem;
        }

        .section-label::before {
            content: '';
            width: 30px;
            height: 2px;
            background: var(--gradient-primary);
        }

        .services {
            padding: 120px 0;
            background: var(--dark);
            position: relative;
        }

        .services::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: var(--dark-card);
            border: 1px solid rgba(99,102,241,0.12);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .service-card:hover {
            transform: translateY(-8px);
            border-color: rgba(99,102,241,0.3);
            box-shadow: var(--shadow-glow);
        }

        .service-card:hover::before { transform: scaleX(1); }

        .service-card.featured {
            border-color: rgba(6,182,212,0.3);
            background: linear-gradient(180deg, rgba(6,182,212,0.05) 0%, var(--dark-card) 100%);
        }

        .service-card.featured::before { background: var(--gradient-secondary); }
        .service-card.featured:hover { box-shadow: var(--shadow-glow-cyan); }

        .service-badge {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: var(--gradient-secondary);
            color: var(--dark);
            padding: 0.35rem 1rem;
            border-radius: var(--radius-xl);
            font-family: var(--font-accent);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .service-icon {
            width: 64px;
            height: 64px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            color: white;
            box-shadow: var(--shadow-glow);
        }

        .service-card.featured .service-icon {
            background: var(--gradient-secondary);
            box-shadow: var(--shadow-glow-cyan);
        }

        .service-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            color: var(--light);
        }

        .service-card > p {
            color: var(--gray-400);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .price-tag, .price-range {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .price {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--secondary);
        }

        .unit {
            color: var(--gray-500);
            font-size: 0.85rem;
            margin-left: 0.5rem;
            font-family: var(--font-accent);
        }

        .price-item { margin-bottom: 0.5rem; }

        .features {
            list-style: none;
            margin-top: 1.5rem;
        }

        .features li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            color: var(--gray-300);
            font-size: 0.9rem;
        }

        .features i {
            color: var(--secondary);
            font-size: 0.8rem;
        }

        .service-payment {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .payment-label {
            font-family: var(--font-accent);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-500);
            margin-bottom: 0.75rem;
        }

        .payment-methods-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .payment-method-icon {
            height: 28px;
            width: auto;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .payment-method-icon:hover { opacity: 1; }

        .pay-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.875rem;
            border-radius: var(--radius-md);
            font-family: var(--font-accent);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .pay-btn-stripe {
            background: #635BFF;
            color: white;
        }

        .pay-btn-stripe:hover {
            background: #7c73ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,91,255,0.3);
        }

        .pay-btn-paypal {
            background: #0070BA;
            color: white;
            margin-top: 0.5rem;
        }

        .pay-btn-paypal:hover {
            background: #0089e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,112,186,0.3);
        }

        .pay-btn i { font-size: 1rem; }

        .trust-section {
            padding: 60px 0;
            background: var(--darker);
            border-top: 1px solid rgba(99,102,241,0.1);
            border-bottom: 1px solid rgba(99,102,241,0.1);
        }

        .trust-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .trust-title {
            font-family: var(--font-accent);
            font-size: 0.85rem;
            text-
