<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - Sound Supply</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="wave"></canvas>
<nav>
  <h1>SoundSupply</h1>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="order.html" class="nav-cta">Order Now</a>
  </div>
  <button class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
</nav>
<div class="order-page">
  <div class="order-box">
    <h2>Place Your Order</h2>
    <p class="sub">Fill out the form and complete payment to get started</p>
    <form onsubmit="submitOrder(event)">
      <input type="text" placeholder="Artist Name" required>
      <select id="service" required>
        <option value="">Select Service</option>
        <option value="songwriting">Songwriting — $30</option>
        <option value="ghostwriting">Ghostwriting — $100–$175</option>
        <option value="mastering">Mastering — $15–$25</option>
        <option value="editing">Song Editing — $15–$35</option>
        <option value="distribution">Distribution Scout — Free</option>
      </select>
      <select>
        <option value="">Select Tier (if applicable)</option>
        <option>Basic</option>
        <option>Premium</option>
      </select>
      <textarea placeholder="Describe your project — genre, style, references, deadlines..." required></textarea>
      <input type="file" accept="audio/*,.mp3,.wav,.aiff">
      <div class="pay-logos">
        <i class="fab fa-cc-paypal" title="PayPal"></i>
        <i class="fab fa-cc-stripe" title="Stripe"></i>
        <i class="fab fa-cc-visa" title="Visa"></i>
        <i class="fab fa-cc-mastercard" title="Mastercard"></i>
        <i class="fab fa-cc-apple-pay" title="Apple Pay"></i>
      </div>
      <button type="submit" class="pay-btn"><i class="fas fa-lock"></i> Complete Order</button>
    </form>
  </div>
</div>
<script>
const canvas=document.getElementById("wave"),ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
let t=0;
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);const colors=['rgba(99,102,241,0.12)','rgba(139,92,246,0.08)','rgba(6,182,212,0.06)'];for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(0,canvas.height/2);for(let x=0;x<canvas.width;x++){let y=canvas.height/2+Math.sin((x+t*(1+i*0.25))*0.016)*(40-i*10);ctx.lineTo(x,y);}ctx.strokeStyle=colors[i];ctx.lineWidth=2-i*0.5;ctx.shadowBlur=20;ctx.shadowColor=i===0?'#6366f1':'#06b6d4';ctx.stroke();}t+=1.2;requestAnimationFrame(draw);}
draw();
function toggleMenu(){document.querySelector('.nav-links').classList.toggle('open');}
const params=new URLSearchParams(window.location.search),svc=params.get('service');
if(svc){const sel=document.getElementById('service');for(let o of sel.options){if(o.value===svc){o.selected=true;break;}}}
function submitOrder(e){e.preventDefault();alert('Order submitted! We\'ll contact you shortly.');e.target.reset();}
</script>
</body>
</html>
