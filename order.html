<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Order - Sound Supply</title>
</head>
<body>

<nav>
  <h1>Sound Supply</h1>
  <a href="services.html">← Back to Services</a>
</nav>

<section class="order-container">
  <h2>Place Your Order</h2>
  <form>
    <input type="text" placeholder="Artist Name" required>
    <textarea placeholder="Describe your project..." required></textarea>
    <select>
      <option>Select Service Tier</option>
      <option>Basic</option>
      <option>Premium</option>
    </select>
    <input type="file">
    <div class="payment-logos">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/PayPal.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Stripe_logo%2C_revised_2016.svg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png">
    </div>
    <a href="https://buy.stripe.com/yourlink" class="pay-btn">Complete Order</a>
  </form>
</section>

</body>
</html>
